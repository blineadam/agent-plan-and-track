name: nightly style refresh

# Runs unattended nightly against main: a headless Claude Code session
# re-runs /inherit-legacy-style then /copilot-review-instructions (see
# skills/inherit-legacy-style and skills/copilot-review-instructions), a
# mechanical step opens a PR if either produced drift, requests a GitHub
# Copilot review, a second headless session triages findings and edits
# files, a mechanical step commits that fix and comments on the PR, a
# mechanical step resolves every review thread and waits for the PR's
# required checks, then a mechanical step squash-merges behind a
# diff-allowlist guard.
#
# Two tokens are in play. The GH_TOKEN secret, a repo-scoped personal
# access token, is declared by name on every step that writes to GitHub:
# opening the PR, pushing the refresh commit and the review-fix commit,
# requesting the Copilot review, resolving review threads, and the
# squash-merge. That split exists because the org's workflow settings
# block the default GITHUB_TOKEN from creating pull requests, and because
# events performed with the default GITHUB_TOKEN don't trigger other
# workflow runs (workflow_dispatch and repository_dispatch are the only
# exceptions: https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow),
# which would starve the PR of the CI checks the merge step later waits
# on. The default token is kept on the two read-only steps (preflight,
# fetch-review) to minimize scope. Neither Claude session ever holds
# either token: each runs with --dangerously-skip-permissions but no
# ability to push, open a PR, or call the GitHub API, so prompt-injected
# repository content it reads can change files in the working tree but
# can't use `gh` or `git push` to touch anything else. What actually keeps
# both sessions credential-free is checkout's persist-credentials flag,
# set to false below, not the token scoping by itself: checkout's own
# default (persist-credentials: true) would otherwise configure the
# default token for git's use, stored in a file under $RUNNER_TEMP as of
# actions/checkout v6+ rather than in .git/config
# (https://github.com/actions/checkout#readme), reachable by both sessions
# regardless of which token any later step declares in its own env. A
# Claude session hands its output to the next mechanical step as a plain
# file under $RUNNER_TEMP (outside the git working tree, so it can never
# land in a commit) rather than acting on GitHub directly. The
# diff-allowlist guard -- the PR may only touch .ai-style-rules.md and
# .github/instructions/*.instructions.md -- is a second, independent
# backstop on top of that token scoping.
#
# Resolve Copilot review threads runs before the merge attempt because the
# main-branch ruleset requires every review thread formally resolved (the
# GraphQL resolveReviewThread mutation), not just replied to. Wait for
# required checks runs after the guard and before the merge because the
# review-fix push emits its own pull_request: synchronize event, which
# re-triggers CI on the new head SHA, and the merge step must not race
# ahead of that run finishing.
#
# Permission mode: sessions run with --dangerously-skip-permissions (fully
# unattended, no human to approve tool calls). Anthropic's own docs recommend
# `dontAsk` mode plus an explicit allowlist for CI instead
# (https://code.claude.com/docs/en/permission-modes), and warn that
# bypassPermissions "offers no protection against prompt injection or
# unintended actions." Bypass is used here anyway because it was explicitly
# requested; the token-scoping and diff-allowlist guard above are the actual
# backstops, independent of permission mode.
#
# Review-wait is a bounded poll loop in this same job (not a second
# pull_request_review-triggered workflow): a PR opened with the default
# GITHUB_TOKEN doesn't trigger other workflow runs, so an event-driven split
# would silently never fire. If the poll step fails (no Copilot review within
# 15 minutes), the run goes red and the PR is left open for a human -- that
# is the intended degrade path, not a bug.
#
# install.sh wires this repo's own PreToolUse hooks into the runner's
# ~/.claude/settings.json; PLANGATE_DISABLED and GATEGUARD_DISABLED are set
# for every Claude step below because both hooks are designed to block an
# unattended session (plan-gate expects a plan-and-track Skill invocation
# that never happens headlessly; gateguard expects a human retry).
#
# A stuck PR from a prior night (poll timeout, or a run that failed after
# opening the PR) makes the next night's preflight step skip entirely until
# a human closes or merges it.
#
# Two checkpoints track different things. .ai-style-rules.md's own commit
# fingerprint only advances when /inherit-legacy-style finds real convention
# drift to record, so a commit that touches source but produces none (a
# typo fix, a version bump) leaves it stuck behind that commit indefinitely.
# NIGHTLY_STYLE_LAST_CHECKED_SHA, a GitHub Actions repository variable, tracks
# something narrower instead: the last commit this run actually examined --
# the checked-out HEAD on a quiet night, or the bot's own squash-merge commit
# when this run found drift and merged a PR, but only if that squash commit's
# first parent is the checked-out HEAD; a squash merge is built on main's tip
# at merge time, so if an unrelated commit landed on main between checkout
# and merge, that commit is a parent of the squash commit but was never
# examined by this run, and the checkpoint step falls back to the
# checked-out HEAD instead so the next run re-examines it rather than
# skipping past it. Never main's live tip either way, for the same reason.
# Preflight skips only when HEAD matches it exactly, so a quiet
# night with nothing new needs no commit-range math or path exclusions --
# and it lives outside git history because the main-branch ruleset requires
# a PR for every change, including a checkpoint-only bump, and opening one
# every quiet night would be worse than the problem it fixes.

on:
  schedule:
    - cron: "43 5 * * *" # off-peak minute; GitHub delays exact top-of-hour crons
  workflow_dispatch: # manual trigger for testing

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: nightly-style-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: github.repository == 'blineadam/agent-plan-and-track'
    timeout-minutes: 60
    env:
      BRANCH: bot/style-refresh-${{ github.run_id }}
      CLAUDE_CODE_VERSION: "2.1.214"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0 # inherit-legacy-style diffs recorded-fingerprint..HEAD; shallow breaks that
          persist-credentials: false

      - name: Preflight -- skip if a prior nightly PR is still open, or nothing changed
        id: preflight
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          open="$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("bot/style-refresh-"))] | length')"
          if [ "$open" != "0" ]; then
            echo "a prior nightly PR is still open; skipping"
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          checkpoint="${{ vars.NIGHTLY_STYLE_LAST_CHECKED_SHA }}"
          head="$(git rev-parse HEAD)"
          if [ "$head" = "$checkpoint" ]; then
            echo "HEAD $head already examined (matches checkpoint); skipping"
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=0" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code CLI
        if: steps.preflight.outputs.skip == '0'
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}"

      - name: Deploy repo skills and hooks to the runner's HOME
        if: steps.preflight.outputs.skip == '0'
        run: ./install.sh all

      - name: Configure git identity
        if: steps.preflight.outputs.skip == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh style artifacts (Claude session 1)
        if: steps.preflight.outputs.skip == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PLANGATE_DISABLED: "1"
          GATEGUARD_DISABLED: "1"
        run: |
          set -euo pipefail
          claude -p --dangerously-skip-permissions "You are running unattended in CI on a fresh checkout of main. No user is available: never ask a question or wait for input, and never invent an answer to a question you'd normally ask a user -- defer it instead as described below. You have no GitHub token: don't run git or gh commands, and don't try to.

          Run /inherit-legacy-style. It will detect incremental-update mode itself. If a strong-signal conflict would normally trigger its one-question-at-a-time protocol, do not guess: leave that convention uncaptured and note it as a 'Deferred conflict:' bullet you'll include in the PR body's '## Summary' section below. Decline its offer to add soft/hard persistence wiring (this repo already references .ai-style-rules.md from AGENTS.md). If it offers to invoke /copilot-review-instructions, accept; otherwise run /copilot-review-instructions yourself afterward -- both of its preconditions already hold in this repo.

          Hard boundary: only .ai-style-rules.md and .github/instructions/*.instructions.md may change. If anything else changed, revert it before finishing.

          If \`git status --porcelain\` is empty when both skills are done, print the single line NO_CHANGES and stop -- do not write a summary file.

          Otherwise, write a file at \"$RUNNER_TEMP/pr-summary.md\": its first line is a one-line PR title describing the change (no AI/tool self-attribution), then a blank line, then the PR body, structured as exactly two sections matching this repo's PR convention. '## Summary': bullet points covering what actually drifted and why each change was captured, with a 'Deferred conflict:' bullet for anything deferred. '## Test plan': a markdown checklist of the verification that applies to a style-artifact-only change -- '- [x]' items for what already ran in this session (which skill or skills, and what they regenerated), '- [ ]' items for the gates later workflow steps apply (the diff-allowlist guard and the Copilot review). There is no test suite for this kind of change; do not claim one ran. No AI/tool self-attribution anywhere. Then stop -- a later step in this workflow handles committing, pushing, and opening the PR."

      - name: Commit changes and open a PR
        id: pr
        if: steps.preflight.outputs.skip == '0'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_pr=0" >> "$GITHUB_OUTPUT"
            echo "no changes from Claude session 1"
            exit 0
          fi
          summary="$RUNNER_TEMP/pr-summary.md"
          if [ ! -s "$summary" ]; then
            echo "session 1 left uncommitted changes but no summary file; aborting" >&2
            exit 1
          fi
          title="$(head -n1 "$summary")"
          git checkout -b "$BRANCH"
          git add .ai-style-rules.md .github/instructions/*.instructions.md
          git commit -m "$title"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "$title" --body-file <(tail -n +2 "$summary")
          number="$(gh pr view "$BRANCH" --json number --jq .number)"
          echo "has_pr=1" >> "$GITHUB_OUTPUT"
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Request Copilot review and wait for it
        if: steps.pr.outputs.has_pr == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          pr="${{ steps.pr.outputs.number }}"
          gh api "repos/${{ github.repository }}/pulls/$pr/requested_reviewers" \
            -f 'reviewers[]=copilot-pull-request-reviewer[bot]'
          for i in $(seq 1 30); do
            done_count="$(gh api "repos/${{ github.repository }}/pulls/$pr/reviews" \
              --jq '[.[] | select(.user.login == "copilot-pull-request-reviewer[bot]")] | length')"
            [ "$done_count" -gt 0 ] && exit 0
            sleep 30
          done
          echo "Copilot review did not land within 15 minutes; leaving PR #$pr open" >&2
          exit 1

      - name: Fetch Copilot's review for session 2
        if: steps.pr.outputs.has_pr == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ steps.pr.outputs.number }}"
          {
            echo "## Reviews"
            gh api "repos/${{ github.repository }}/pulls/$pr/reviews"
            echo "## Review comments"
            gh api "repos/${{ github.repository }}/pulls/$pr/comments"
          } > "$RUNNER_TEMP/copilot-review.json"

      - name: Address the review (Claude session 2)
        if: steps.pr.outputs.has_pr == '1'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PLANGATE_DISABLED: "1"
          GATEGUARD_DISABLED: "1"
        run: |
          set -euo pipefail
          claude -p --dangerously-skip-permissions "You are running unattended in CI, continuing work on branch $BRANCH (already checked out). No user is available: never ask a question or wait for input. You have no GitHub token: don't run git or gh commands, and don't try to.

          Read Copilot's completed review from the file \"$RUNNER_TEMP/copilot-review.json\" (already fetched: a JSON dump of the PR's reviews, then its review comments). Judge each finding against this repo's real conventions (.ai-style-rules.md, AGENTS.md, and whatever source the finding concerns), not generic style preference.

          Fix the valid findings by editing files directly. Hard boundary: only .ai-style-rules.md and .github/instructions/*.instructions.md may change.

          Write a file at \"$RUNNER_TEMP/deferred-findings.md\" listing each finding you did not act on, with a one-line reason (leave the file empty, or don't create it, if you acted on everything). Then stop -- a later step in this workflow handles committing, pushing, and commenting on the PR."

      - name: Commit the review fix and comment on the PR
        if: steps.pr.outputs.has_pr == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            git add .ai-style-rules.md .github/instructions/*.instructions.md
            git commit -m "Address Copilot review feedback on PR #$PR_NUMBER"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/$BRANCH"
          fi
          deferred="$RUNNER_TEMP/deferred-findings.md"
          if [ -s "$deferred" ]; then
            gh pr comment "$PR_NUMBER" --body-file "$deferred"
          fi

      - name: Resolve Copilot review threads
        if: steps.pr.outputs.has_pr == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          pr="${{ steps.pr.outputs.number }}"
          # Scoped to threads Copilot itself opened: resolving a thread a human
          # reviewer left while this unattended run was in flight would satisfy
          # the ruleset's required_review_thread_resolution rule without the
          # feedback ever having been addressed.
          ids="$(gh api graphql \
            -f query='query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) { pullRequest(number: $number) {
                reviewThreads(first: 100) { nodes { id isResolved comments(first: 1) { nodes { author { login } } } } } } } }' \
            -f owner="${{ github.repository_owner }}" -f repo="${GITHUB_REPOSITORY#*/}" -F number="$pr" \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved | not) | select(.comments.nodes[0].author.login == "copilot-pull-request-reviewer") | .id')"
          for id in $ids; do
            gh api graphql \
              -f query='mutation($id: ID!) { resolveReviewThread(input: {threadId: $id}) { thread { isResolved } } }' \
              -f id="$id"
          done

      - name: Guard -- the PR only touches the style-artifact allowlist
        if: steps.pr.outputs.has_pr == '1'
        run: |
          set -euo pipefail
          git fetch origin "$BRANCH"
          bad="$(git diff --name-only "origin/main...origin/$BRANCH" \
            | grep -Ev '^(\.ai-style-rules\.md|\.github/instructions/[^/]+\.instructions\.md)$' || true)"
          if [ -n "$bad" ]; then
            echo "PR touches files outside the style allowlist:" >&2
            echo "$bad" >&2
            exit 1
          fi

      - name: Wait for required checks on the PR head
        if: steps.pr.outputs.has_pr == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          pr="${{ steps.pr.outputs.number }}"
          # This repo has no branch-protection-level required status checks
          # (`gh pr checks --required` errors "no required checks reported"
          # for every PR here; only the ruleset's thread-resolution and
          # code-scanning rules gate the merge). mergeStateStatus is GitHub's
          # own authoritative merge-readiness signal, so poll that instead of
          # guessing which checks are required. Per GitHub's GraphQL schema
          # (https://docs.github.com/en/graphql/reference/enums#mergestatestatus),
          # CLEAN means "mergeable and passing commit status" and UNSTABLE
          # means "mergeable with non-passing commit status" -- a check that's
          # merely pending (required or not) keeps the PR at UNSTABLE, not
          # CLEAN, so this loop already keeps polling until every check has
          # settled, not just the required ones. The explicit failed-check
          # check below is a belt-and-suspenders hard stop on top of that.
          for i in $(seq 1 80); do
            info="$(gh pr view "$pr" --json mergeStateStatus,statusCheckRollup)"
            merge_status="$(echo "$info" | jq -r '.mergeStateStatus')"
            failed="$(echo "$info" | jq -r '[.statusCheckRollup[]? | select((.conclusion // .state) as $c | $c == "FAILURE" or $c == "CANCELLED" or $c == "TIMED_OUT" or $c == "ERROR")] | length')"
            if [ "$failed" != "0" ]; then
              echo "a check on the PR head failed (mergeStateStatus=$merge_status)" >&2
              exit 1
            fi
            case "$merge_status" in
              CLEAN|HAS_HOOKS) exit 0 ;;
              DIRTY)
                echo "PR has merge conflicts (mergeStateStatus=$merge_status)" >&2; exit 1 ;;
              *) ;; # BEHIND, BLOCKED, UNSTABLE, UNKNOWN -- still settling, keep polling
            esac
            sleep 15
          done
          echo "PR did not reach a mergeable state within 20 minutes; leaving PR #$pr open" >&2
          exit 1

      - name: Squash-merge and delete the branch
        if: steps.pr.outputs.has_pr == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch

      - name: Advance the run checkpoint to the examined commit
        if: steps.preflight.outputs.skip == '0'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          examined="${{ steps.preflight.outputs.head_sha }}"
          sha="$examined"
          if [ "${{ steps.pr.outputs.has_pr }}" = "1" ]; then
            merge_sha="$(gh pr view "${{ steps.pr.outputs.number }}" --json mergeCommit --jq .mergeCommit.oid)"
            parent_sha="$(gh api "repos/${{ github.repository }}/commits/$merge_sha" --jq .parents[0].sha)"
            if [ "$parent_sha" = "$examined" ]; then
              sha="$merge_sha"
            fi
          fi
          gh variable set NIGHTLY_STYLE_LAST_CHECKED_SHA --body "$sha"
