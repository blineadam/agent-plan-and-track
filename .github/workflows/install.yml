name: installer smoke test

# Verifies that both installers deploy a correct, idempotent file layout and that
# the shared Node scripts run on each platform. Out of scope (no harness CLI on
# the runners): whether Claude/Codex/Copilot actually load and fire the hooks at
# session time. That is the manual smoke test noted in tasks/todo.md Phase E.

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  unix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Tooling versions
        run: jq --version && node --version
      - name: Install twice (idempotent) into a scratch HOME
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/scratch-home"; mkdir -p "$HOME"
          ./install.sh all
          out="$(./install.sh all)"
          echo "$out"
          echo "$out" | grep -q 'digest hook     -- already present' \
            || { echo "FAIL: digest hook not detected as already present on re-run"; exit 1; }
      - name: Assert layout, defaults, and hook wiring
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/scratch-home"
          for f in \
            "$HOME/.claude/scripts/core-rules-digest.js" \
            "$HOME/.claude/scripts/gateguard.js" \
            "$HOME/.claude/scripts/delivery-gate.js" \
            "$HOME/.claude/scripts/suggest-compact.js" \
            "$HOME/.claude/scripts/plan-gate.js" \
            "$HOME/.codex/scripts/core-rules-digest.js" \
            "$HOME/.copilot/scripts/core-rules-digest.js" \
            "$HOME/.claude/CLAUDE.md" "$HOME/.codex/AGENTS.md" \
            "$HOME/.copilot/copilot-instructions.md"; do
            test -f "$f" || { echo "FAIL: missing $f"; exit 1; }
          done
          [ "$(jq -r .model "$HOME/.claude/settings.json")" = "opusplan" ]
          [ "$(jq -r .switchModelsOnFlag "$HOME/.claude/settings.json")" = "true" ]
          [ "$(jq -r .model "$HOME/.copilot/settings.json")" = "auto" ]
          grep -q 'plan_mode_reasoning_effort = "xhigh"' "$HOME/.codex/config.toml"
          grep -q 'agent-plan-and-track:begin' "$HOME/.claude/CLAUDE.md"
          # No unresolved placeholder leaked into any installed config.
          ! grep -rq '__SCRIPTS__' "$HOME/.claude" "$HOME/.codex" "$HOME/.copilot"
          # The digest hook command points at a script that actually exists...
          cmd="$(jq -r '.hooks.UserPromptSubmit[0].hooks[0].command' "$HOME/.claude/settings.json")"
          echo "$cmd" | grep -q 'core-rules-digest.js'
          f="$(echo "$cmd" | sed -E 's/^node "([^"]+)".*/\1/')"
          test -f "$f" || { echo "FAIL: baked hook path does not exist: $f"; exit 1; }
          # ...and it was merged exactly once (no double-merge across two installs).
          n="$(jq '[.. | .command? // empty | select(test("core-rules-digest"))] | length' "$HOME/.claude/settings.json")"
          [ "$n" = "1" ] || { echo "FAIL: expected 1 digest hook, found $n"; exit 1; }
          # Codex TOML agents: one rendered file per agents/*.md source.
          agent_md_count="$(ls agents/*.md | wc -l | tr -d ' ')"
          agent_toml_count="$(ls "$HOME/.codex/agents"/*.toml | wc -l | tr -d ' ')"
          [ "$agent_toml_count" = "$agent_md_count" ] \
            || { echo "FAIL: expected $agent_md_count Codex agent TOML files, found $agent_toml_count"; exit 1; }
          # Each rendered TOML must actually parse and carry exactly the expected
          # keys, with no stray Claude `model` key (existence/count alone doesn't
          # prove the renderer emitted valid or complete output).
          python3 -c "import glob, os, sys, tomllib; expected={'name','description','model_reasoning_effort','sandbox_mode','developer_instructions'}; files=sorted(glob.glob(os.path.join(sys.argv[1],'*.toml'))); assert files, 'no Codex agent TOML files found'; bad=[(f, sorted(tomllib.load(open(f,'rb')).keys())) for f in files if set(tomllib.load(open(f,'rb')).keys())!=expected]; assert not bad, f'bad TOML key sets: {bad}'; print(f'OK: validated TOML structure for {len(files)} rendered Codex agents')" "$HOME/.codex/agents"
      - name: Shared Node scripts run
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/scratch-home"
          node "$HOME/.claude/scripts/core-rules-digest.js" | grep -q . \
            || { echo "FAIL: digest produced no output"; exit 1; }
          node "$HOME/.copilot/scripts/core-rules-digest.js" --copilot >/dev/null
          node skills/skill-activation/scripts/run-activation-cases.js --dry-run >/dev/null
          node skills/skill-activation/scripts/run-activation-cases.js --precheck "$HOME/.claude/skills" >/dev/null
          node skills/context-budget/scripts/scan-context.js ./skills >/dev/null
          node skills/rules-distill/scripts/scan-rules.js >/dev/null
          node skills/rules-distill/scripts/scan-skills.js ./skills >/dev/null
      - name: Office skills installer (stubbed fetch, no network)
        run: |
          set -euo pipefail
          stub_bin="$RUNNER_TEMP/office-stub-bin"
          mkdir -p "$stub_bin"
          cat > "$stub_bin/npx" <<'STUB'
          #!/usr/bin/env bash
          # Fakes `npx skills add ... --agent <id> -g ...`'s output shape without
          # hitting the network, so this test exercises install-office-skills.sh's
          # own detection/dispatch logic deterministically. Reads --agent from its
          # own args and routes to the same directories the real skills CLI uses:
          # claude-code -> ~/.claude/skills, codex/github-copilot -> the shared
          # ~/.agents/skills. Requires -g so a future regression that drops the
          # global flag from the real script fails this test instead of passing.
          agent=""
          global=false
          while [ $# -gt 0 ]; do
            case "$1" in
              --agent) agent="$2"; shift 2 ;;
              -g) global=true; shift ;;
              *) shift ;;
            esac
          done
          $global || { echo "stub: expected -g (global install) but it was not passed" >&2; exit 1; }
          case "$agent" in
            claude-code) dest="$HOME/.claude/skills" ;;
            codex|github-copilot) dest="$HOME/.agents/skills" ;;
            *) echo "stub: unknown --agent $agent" >&2; exit 1 ;;
          esac
          echo "$agent" >> "$HOME/agent-invocations.log"
          for s in docx pdf pptx xlsx; do
            mkdir -p "$dest/$s"
            printf -- '---\nname: %s\ndescription: stub\n---\n# stub\n' "$s" > "$dest/$s/SKILL.md"
          done
          STUB
          chmod +x "$stub_bin/npx"
          printf '#!/usr/bin/env bash\n' > "$stub_bin/claude"; chmod +x "$stub_bin/claude"
          printf '#!/usr/bin/env bash\n' > "$stub_bin/codex"; chmod +x "$stub_bin/codex"
          export HOME="$RUNNER_TEMP/scratch-home-office"; mkdir -p "$HOME/.copilot"
          export PATH="$stub_bin:$PATH"
          ./install-office-skills.sh
          ./install-office-skills.sh   # rerun: must not fail
          for s in docx pdf pptx xlsx; do
            test -f "$HOME/.claude/skills/$s/SKILL.md" \
              || { echo "FAIL: missing $HOME/.claude/skills/$s/SKILL.md"; exit 1; }
            test -f "$HOME/.agents/skills/$s/SKILL.md" \
              || { echo "FAIL: missing $HOME/.agents/skills/$s/SKILL.md"; exit 1; }
          done
          # Codex and GitHub Copilot both write the shared .agents/skills tree, so
          # the file-existence checks above pass even if one of the two dispatch
          # branches is silently removed. Assert each agent was actually invoked.
          for a in claude-code codex github-copilot; do
            grep -qx "$a" "$HOME/agent-invocations.log" \
              || { echo "FAIL: $a was never invoked"; exit 1; }
          done

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Tooling versions
        shell: powershell
        run: $PSVersionTable.PSVersion; node --version
      - name: Install twice (idempotent) into a scratch USERPROFILE
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $env:USERPROFILE = "$env:RUNNER_TEMP\scratch-home"
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          .\install.ps1 all
          # install.ps1 reports via Write-Host (Information stream); 6>&1 folds
          # that into the pipeline so Out-String can capture it for the assertion.
          $out = (.\install.ps1 all 6>&1 | Out-String)
          Write-Host $out
          if ($out -notmatch 'digest hook\s+-- already present') {
            throw "digest hook not detected as already present on re-run"
          }
      - name: Assert layout, defaults, and hook wiring
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $env:USERPROFILE = "$env:RUNNER_TEMP\scratch-home"
          $H = $env:USERPROFILE
          $need = @(
            "$H\.claude\scripts\core-rules-digest.js",
            "$H\.claude\scripts\gateguard.js",
            "$H\.claude\scripts\delivery-gate.js",
            "$H\.claude\scripts\suggest-compact.js",
            "$H\.claude\scripts\plan-gate.js",
            "$H\.codex\scripts\core-rules-digest.js",
            "$H\.copilot\scripts\core-rules-digest.js",
            "$H\.claude\CLAUDE.md", "$H\.codex\AGENTS.md",
            "$H\.copilot\copilot-instructions.md"
          )
          foreach ($f in $need) { if (-not (Test-Path -LiteralPath $f)) { throw "missing $f" } }
          $s = Get-Content -Raw "$H\.claude\settings.json" | ConvertFrom-Json
          if ($s.model -ne 'opusplan') { throw "model != opusplan" }
          if ($s.switchModelsOnFlag -ne $true) { throw "switchModelsOnFlag != true" }
          $c = (Get-Content -Raw "$H\.copilot\settings.json" | ConvertFrom-Json).model
          if ($c -ne 'auto') { throw "copilot model != auto" }
          if ((Get-Content -Raw "$H\.codex\config.toml") -notmatch 'plan_mode_reasoning_effort = "xhigh"') { throw "codex effort missing" }
          if ((Get-Content -Raw "$H\.claude\CLAUDE.md") -notmatch 'agent-plan-and-track:begin') { throw "managed block missing" }
          # No unresolved placeholder leaked into any installed config.
          $leak = Get-ChildItem -Recurse -File "$H\.claude","$H\.codex","$H\.copilot" |
                  Select-String -SimpleMatch '__SCRIPTS__' -List
          if ($leak) { throw "__SCRIPTS__ placeholder leaked into installed files" }
          # Digest hook command points at a script that exists, merged exactly once.
          $cmd = $s.hooks.UserPromptSubmit[0].hooks[0].command
          if ($cmd -notmatch 'core-rules-digest\.js') { throw "digest command missing" }
          $baked = ($cmd -replace '^node "([^"]+)".*', '$1')
          if (-not (Test-Path -LiteralPath $baked)) { throw "baked hook path does not exist: $baked" }
          # Only the digest hook command references the digest script, so a raw
          # string count of 1 proves it was merged exactly once (no double-merge).
          $raw = Get-Content -Raw "$H\.claude\settings.json"
          $n = ([regex]::Matches($raw, 'core-rules-digest')).Count
          if ($n -ne 1) { throw "expected 1 digest hook, found $n" }
          # Codex TOML agents: one rendered file per agents/*.md source.
          $agentMdCount = (Get-ChildItem 'agents\*.md').Count
          $agentTomlCount = (Get-ChildItem "$H\.codex\agents\*.toml").Count
          if ($agentTomlCount -ne $agentMdCount) { throw "expected $agentMdCount Codex agent TOML files, found $agentTomlCount" }
          # Each rendered TOML must actually parse and carry exactly the expected
          # keys, with no stray Claude `model` key (existence/count alone doesn't
          # prove the renderer emitted valid or complete output).
          $validatorLines = @(
            'import glob, os, sys, tomllib',
            'expected = {"name", "description", "model_reasoning_effort", "sandbox_mode", "developer_instructions"}',
            'files = sorted(glob.glob(os.path.join(sys.argv[1], "*.toml")))',
            'assert files, "no Codex agent TOML files found"',
            'bad = [(f, sorted(tomllib.load(open(f, "rb")).keys())) for f in files if set(tomllib.load(open(f, "rb")).keys()) != expected]',
            'assert not bad, f"bad TOML key sets: {bad}"',
            'print(f"OK: validated TOML structure for {len(files)} rendered Codex agents")'
          )
          $validatorPath = Join-Path $env:RUNNER_TEMP 'validate_codex_toml.py'
          Set-Content -Path $validatorPath -Value $validatorLines -Encoding utf8
          python $validatorPath "$H\.codex\agents"
          if ($LASTEXITCODE -ne 0) { throw "Codex TOML validation failed" }
      - name: Shared Node scripts run
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $env:USERPROFILE = "$env:RUNNER_TEMP\scratch-home"
          $H = $env:USERPROFILE
          # PowerShell does not turn a native nonzero exit into a terminating
          # error, and each call overwrites $LASTEXITCODE, so check after every one.
          function Assert-Node($label) { if ($LASTEXITCODE -ne 0) { throw "$label exited $LASTEXITCODE" } }
          $digest = (node "$H\.claude\scripts\core-rules-digest.js" | Out-String); Assert-Node 'digest'
          if ($digest.Trim().Length -eq 0) { throw "digest produced no output" }
          node "$H\.copilot\scripts\core-rules-digest.js" --copilot | Out-Null; Assert-Node 'copilot digest'
          node skills\skill-activation\scripts\run-activation-cases.js --dry-run | Out-Null; Assert-Node 'run-activation --dry-run'
          node skills\skill-activation\scripts\run-activation-cases.js --precheck "$H\.claude\skills" | Out-Null; Assert-Node 'run-activation --precheck'
          node skills\context-budget\scripts\scan-context.js .\skills | Out-Null; Assert-Node 'scan-context'
          node skills\rules-distill\scripts\scan-rules.js | Out-Null; Assert-Node 'scan-rules'
          node skills\rules-distill\scripts\scan-skills.js .\skills | Out-Null; Assert-Node 'scan-skills'
      - name: Office skills installer (stubbed fetch, no network)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $stubBin = Join-Path $env:RUNNER_TEMP 'office-stub-bin'
          New-Item -ItemType Directory -Force -Path $stubBin | Out-Null
          # Fakes `npx skills add ... --agent <id> -g ...`'s output shape without
          # hitting the network, so this test exercises install-office-skills.ps1's
          # own detection/dispatch logic deterministically. The actual routing
          # logic lives in a PowerShell child script (easier to get right than
          # cmd.exe batch argument parsing); npx.cmd is just a launcher, since
          # only .cmd/.exe are resolved via PATH by default. Reads --agent from
          # its own args and routes to the same directories the real skills CLI
          # uses: claude-code -> %USERPROFILE%\.claude\skills, codex/github-copilot
          # -> the shared %USERPROFILE%\.agents\skills. Requires -g so a future
          # regression that drops the global flag from the real script fails this
          # test instead of passing.
          @'
          @echo off
          powershell -NoProfile -ExecutionPolicy Bypass -File "%~dp0npx-stub.ps1" %*
          '@ | Set-Content -Path (Join-Path $stubBin 'npx.cmd') -Encoding ascii
          @'
          $argsStr = $args -join " "
          if ($argsStr -notmatch "(^| )-g( |$)") {
            Write-Error "stub: expected -g (global install) but it was not passed"
            exit 1
          }
          if ($argsStr -notmatch "--agent (\S+)") {
            Write-Error "stub: no --agent found in '$argsStr'"
            exit 1
          }
          $agent = $matches[1]
          if ($agent -eq "claude-code") {
            $dest = Join-Path $env:USERPROFILE ".claude\skills"
          } elseif ($agent -eq "codex" -or $agent -eq "github-copilot") {
            $dest = Join-Path $env:USERPROFILE ".agents\skills"
          } else {
            Write-Error "stub: unknown --agent '$agent'"
            exit 1
          }
          Add-Content -Path (Join-Path $env:USERPROFILE "agent-invocations.log") -Value $agent
          foreach ($s in @("docx", "pdf", "pptx", "xlsx")) {
            New-Item -ItemType Directory -Force -Path (Join-Path $dest $s) | Out-Null
            Set-Content -Path (Join-Path $dest "$s\SKILL.md") -Value "stub"
          }
          exit 0
          '@ | Set-Content -Path (Join-Path $stubBin 'npx-stub.ps1') -Encoding ascii
          '@echo off' | Set-Content -Path (Join-Path $stubBin 'claude.cmd') -Encoding ascii
          '@echo off' | Set-Content -Path (Join-Path $stubBin 'codex.cmd') -Encoding ascii
          $env:PATH = "$stubBin;$env:PATH"
          $env:USERPROFILE = "$env:RUNNER_TEMP\scratch-home-office"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.copilot" | Out-Null
          .\install-office-skills.ps1
          if ($LASTEXITCODE -ne 0) { throw "install-office-skills.ps1 failed with exit code $LASTEXITCODE" }
          .\install-office-skills.ps1   # rerun: must not fail
          if ($LASTEXITCODE -ne 0) { throw "install-office-skills.ps1 (rerun) failed with exit code $LASTEXITCODE" }
          $baseDir = $env:USERPROFILE
          foreach ($harness in @('.claude', '.agents')) {
            foreach ($s in @('docx', 'pdf', 'pptx', 'xlsx')) {
              $p = "$baseDir\$harness\skills\$s\SKILL.md"
              if (-not (Test-Path -LiteralPath $p)) { throw "missing $p" }
            }
          }
          # Codex and GitHub Copilot both write the shared .agents tree, so the
          # file-existence checks above pass even if one dispatch branch is
          # silently removed. Assert each agent was actually invoked.
          $invoked = Get-Content (Join-Path $baseDir "agent-invocations.log")
          foreach ($a in @('claude-code', 'codex', 'github-copilot')) {
            if ($invoked -notcontains $a) { throw "$a was never invoked" }
          }
